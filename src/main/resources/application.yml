# 数据治理分系统 — 默认配置（所有连接参数均 env 可覆盖；不含真实主机/凭据，红线合规）
# 端口基线（M1 §3）：应用 HTTP=8082、管理/actuator=9082（management.server.port 独立）。
server:
  port: ${SERVER_PORT:8082}

spring:
  application:
    name: governance
  datasource:
    url: jdbc:postgresql://${PG_HOST:localhost}:${PG_PORT:5432}/${PG_DB:governance}
    username: ${PG_USER:governance}
    # 口令无默认：生产经 ESO 注入，缺失即 fail-fast（弱口令默认仅 application-local.yml 留作本地开发）
    password: ${PG_PASSWORD}
  sql:
    init:
      mode: never          # 业务表 schema 由 Flyway 管理，禁用 spring.sql 脚本初始化
  jpa:
    # schema 由 Flyway 管理，JPA 不做 DDL（仅校验 entity 映射与库一致，映射漂移即 fail-fast）。
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  elasticsearch:
    uris: ${ES_URIS:http://localhost:9200}

# 健康检查 / 可观测：复用 starter-observability（actuator + /actuator/prometheus）
management:
  server:
    # 管理端口独立于应用端口（M1 §3 端口基线）。
    port: ${MANAGEMENT_SERVER_PORT:9082}
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      # 组件级明细不向匿名调用方暴露：本服务 actuator 在独立管理口（9082）、未挂安全过滤链
      # （不引 starter-security），show-details=always 会把 db/ES 等组件明细暴露给匿名调用方；
      # 收敛为 when-authorized——无鉴权上下文时即不显明细，保守安全（与 control-plane 一致）。
      show-details: when-authorized
      # deps-optional readiness：readiness/liveness 仅看应用自身状态，
      # PG/ES 缺失时在 /actuator/health 报组件 DOWN，但不拖垮 readiness 探针（依赖为可选）。
      group:
        liveness:
          include: livenessState
        readiness:
          include: readinessState

# 平台公共能力开关（libs-java starter）
hashmatrix:
  observability:
    service-name: governance
    common-tags:
      subsystem: governance
  audit:
    enabled: true
