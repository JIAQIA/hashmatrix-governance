name: governance CI

on:
  push:
    branches: [main]
  pull_request:

# 解析 GitHub Packages 上的 io.hashmatrix 公共依赖需 packages:read（顶层默认，build job 用）。
# 发布镜像到 ghcr 需 packages:write —— 仅 image job 在 job 级提权（job 级 permissions 覆盖顶层，遵最小权限）。
permissions:
  contents: read
  packages: read

jobs:
  build:
    name: 构建 + 测试
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}   # 项目版本 → image job 打镜像 tag
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      # 生成含「github 制品仓 + 凭据」的 settings.xml。
      # 关键：pom 的 <repositories> 解析不到 <parent> 自身，parent 必须经 settings.xml 的
      # repository 解析；故此处用 profile 注册制品仓（不仅是 server 凭据），全新 clone 方可构建。
      - name: 配置 Maven settings（GitHub Packages）
        env:
          GH_ACTOR: ${{ github.actor }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p "$HOME/.m2"
          cat > "$HOME/.m2/settings.xml" <<EOF
          <settings>
            <servers>
              <server>
                <id>github</id>
                <username>${GH_ACTOR}</username>
                <password>${GH_TOKEN}</password>
              </server>
            </servers>
            <profiles>
              <profile>
                <id>github</id>
                <repositories>
                  <repository>
                    <id>github</id>
                    <url>https://maven.pkg.github.com/HashMatrixData/hashmatrix</url>
                    <releases><enabled>true</enabled></releases>
                    <snapshots><enabled>false</enabled></snapshots>
                  </repository>
                </repositories>
                <pluginRepositories>
                  <pluginRepository>
                    <id>github</id>
                    <url>https://maven.pkg.github.com/HashMatrixData/hashmatrix</url>
                  </pluginRepository>
                </pluginRepositories>
              </profile>
            </profiles>
            <activeProfiles>
              <activeProfile>github</activeProfile>
            </activeProfiles>
          </settings>
          EOF

      - name: 红线校验（源码/POM/配置无客户信息）
        run: bash scripts/redline-check.sh

      # 密钥/凭据熵扫描：redline-check 只覆盖 IP/denylist，gitleaks 补 token/key 维度
      # （主仓 redline-ci 不进 submodule，本仓凭据门须自带）。
      # 用开源 gitleaks CLI 二进制——licensed gitleaks-action@v2 对 org 仓要求 GITLEAKS_LICENSE
      # （缺则整个 build job 红、连带 image job 不跑），改走免费 CLI 保留密钥扫描门、免 license。
      - name: Gitleaks（密钥扫描 · 开源 CLI）
        env:
          GITLEAKS_VERSION: "8.18.4"
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /tmp gitleaks
          /tmp/gitleaks version
          # --redact 不回显密钥本体；扫 git 历史，命中即 exit 1 → 阻断 CI
          /tmp/gitleaks detect --source . --redact --no-banner -v --exit-code 1

      # 构建 + 单测 + 集成切片（Testcontainers 起 PG/ES，ubuntu runner 自带 Docker）。
      # 质量门（enforcer 基线等）随 platform-parent 复用。
      - name: Build + test (unit + integration)
        run: mvn -B -ntp clean verify

      # 在此解析版本（而非 image job）以复用已就绪的 JDK/Maven 缓存/凭据，免去二次解析 parent。
      - name: 解析项目版本（供镜像 tag）
        id: version
        run: |
          # -DforceStdout 把值写 stdout；为防冷缓存下混入下载/告警行污染 tag，只取末行并校验非空。
          V=$(mvn -B -ntp -q help:evaluate -Dexpression=project.version -DforceStdout | tail -n1)
          if [ -z "$V" ]; then echo "::error::无法解析 project.version"; exit 1; fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "项目版本：$V"

  image:
    name: 构建并发布镜像（ghcr）
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write          # 仅本 job 提权写 ghcr（write 含 read，docker build 拉 parent 复用）
    env:
      VERSION: ${{ needs.build.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      # 镜像内 Dockerfile 的 build 阶段 `mvn package` 仍需经 GitHub Packages 解析 parent/BOM，
      # 故重新生成 settings.xml 经 BuildKit secret 注入（与 build job 内容相同；job 间不共享文件系统，
      # 无 artifact 传递，故此处重新内联生成——已知重复：后续若改制品仓/凭据，两 job 须同步改）。
      - name: 配置 Maven settings（GitHub Packages · 供镜像内 mvn 解析 parent/BOM）
        env:
          GH_ACTOR: ${{ github.actor }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p "$HOME/.m2"
          cat > "$HOME/.m2/settings.xml" <<EOF
          <settings>
            <servers>
              <server>
                <id>github</id>
                <username>${GH_ACTOR}</username>
                <password>${GH_TOKEN}</password>
              </server>
            </servers>
            <profiles>
              <profile>
                <id>github</id>
                <repositories>
                  <repository>
                    <id>github</id>
                    <url>https://maven.pkg.github.com/HashMatrixData/hashmatrix</url>
                    <releases><enabled>true</enabled></releases>
                    <snapshots><enabled>false</enabled></snapshots>
                  </repository>
                </repositories>
                <pluginRepositories>
                  <pluginRepository>
                    <id>github</id>
                    <url>https://maven.pkg.github.com/HashMatrixData/hashmatrix</url>
                  </pluginRepository>
                </pluginRepositories>
              </profile>
            </profiles>
            <activeProfiles>
              <activeProfile>github</activeProfile>
            </activeProfiles>
          </settings>
          EOF

      # 双 tag 方案（平台发布契约 AD，主仓 docs/architecture/04 §4 / Discussion #20）：
      #   · 不可变 :<版本>-<short-sha>（如 :0.1.0-SNAPSHOT-4e8f720）——可追溯到具体提交，部署可 pin；
      #   · 移动 :<版本>（dev 期 :0.1.0-SNAPSHOT）——随 main 覆盖；dev values 配 pullPolicy=Always 取最新。
      # 镜像名对齐主仓 deploy/values（ghcr.io/hashmatrixdata/governance）；ghcr owner 须全小写。
      - name: 计算镜像名与 tag
        id: meta
        run: |
          if [ -z "$VERSION" ]; then echo "::error::上游 build job 未传出 project.version"; exit 1; fi
          OWNER=$(echo "$GITHUB_REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')
          SHA="${GITHUB_SHA::7}"
          echo "image=ghcr.io/${OWNER}/governance" >> "$GITHUB_OUTPUT"
          echo "moving=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "immutable=${VERSION}-${SHA}" >> "$GITHUB_OUTPUT"
          echo "镜像：ghcr.io/${OWNER}/governance · 移动 :${VERSION} · 不可变 :${VERSION}-${SHA}"

      # 仅 push 到 main 时登录并发布；PR 只 build 验证 Dockerfile，不写 registry（避免污染）。
      - name: 登录 ghcr
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 构建镜像（多阶段，BuildKit secret 注入 settings.xml，不落镜像层）
        env:
          DOCKER_BUILDKIT: "1"   # --secret 需 BuildKit；显式兜底，不依赖 runner 默认
        run: |
          docker build \
            --secret id=maven_settings,src="$HOME/.m2/settings.xml" \
            -t "${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.moving }}" \
            -t "${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.immutable }}" \
            .

      # 守护 #18：镜像 USER 必须是「非零数字 uid」，否则 K8s restricted（runAsNonRoot:true 不带 runAsUser）
      # 无法在不启动容器前提下验证 uid≠0 → CreateContainerConfigError。此步在 push 前（PR 也跑，因镜像
      # build 不 gated）做 docker inspect 断言：任何人若把 Dockerfile 改回非数字 USER，CI 在此变红。
      - name: 校验镜像 USER 为非零数字 uid（适配 restricted runAsNonRoot）
        run: |
          # 校验不可变 tag（push 的最终可追溯产物）；与 moving 同一镜像 ID，inspect 任一即可。
          USER_FIELD=$(docker inspect --format '{{.Config.User}}' "${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.immutable }}")
          echo "镜像 Config.User='${USER_FIELD}'"
          case "$USER_FIELD" in
            ''|*[!0-9]*)
              echo "::error::镜像 USER 须为数字 uid（当前='${USER_FIELD}'）；非数字用户名下 K8s runAsNonRoot 无法验证 → CreateContainerConfigError（#18）"
              exit 1 ;;
          esac
          if [ "$USER_FIELD" -eq 0 ]; then
            echo "::error::镜像 USER 为 root(0)，违反 runAsNonRoot"; exit 1
          fi
          echo "✓ USER=${USER_FIELD} 为非零数字 uid，满足 restricted 安全上下文"

      - name: 推送镜像（仅 main · PR 跳过）
        if: github.event_name == 'push'
        run: |
          docker push "${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.moving }}"
          docker push "${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.immutable }}"
