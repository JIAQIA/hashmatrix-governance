# 本地独立运行依赖栈：PostgreSQL(JSONB) + Elasticsearch。
# 用法：docker compose -f docker-compose.local.yml up -d
# 凭据/库名均为脱敏占位（红线合规），仅用于本地开发调试。
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: governance
      POSTGRES_USER: governance
      POSTGRES_PASSWORD: governance
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U governance"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - governance-pg:/var/lib/postgresql/data

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - governance-es:/usr/share/elasticsearch/data

volumes:
  governance-pg:
  governance-es:
